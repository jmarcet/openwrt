@SERIAL_CONFIG@
@TERMINAL_CONFIG@

set default="0"
set timeout="@TIMEOUT@"
set root='(hd0,gpt2)'

menuentry "@TITLE@" {
	linux /boot/vmlinuz root=PARTLABEL=openwrt_rootfs @CMDLINE@ noinitrd
}
menuentry "@TITLE@ alternate partition" {
	linux /boot/vmlinuz-alt root=PARTLABEL=openwrt_rootfs_alt @CMDLINE@ noinitrd
}
menuentry "@TITLE@ (failsafe)" {
	linux /boot/vmlinuz root=PARTLABEL=openwrt_rootfs failsafe=true @CMDLINE@ noinitrd
}
menuentry "@TITLE@ alternate partition (failsafe)" {
	linux /boot/vmlinuz-alt root=PARTLABEL=openwrt_rootfs_alt failsafe=true @CMDLINE@ noinitrd
}
